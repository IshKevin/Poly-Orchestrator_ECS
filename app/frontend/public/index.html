<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopNow – Modern E-Commerce</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6c47ff;
      --primary-dark: #5535d4;
      --surface: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --text-muted: #6e6e73;
      --border: #d2d2d7;
      --success: #34c759;
      --danger: #ff3b30;
      --shadow: 0 2px 16px rgba(0,0,0,.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--surface); color: var(--text); }

    /* ── Header ── */
    header {
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--primary); letter-spacing: -.5px; }
    .cart-btn {
      background: var(--primary); color: #fff; border: none; border-radius: 8px;
      padding: .5rem 1.1rem; cursor: pointer; font-size: .95rem; font-weight: 600;
      display: flex; align-items: center; gap: .5rem; transition: background .15s;
    }
    .cart-btn:hover { background: var(--primary-dark); }
    .cart-badge {
      background: #fff; color: var(--primary); border-radius: 50%;
      width: 20px; height: 20px; font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; }

    /* ── Status bar ── */
    #status-bar {
      padding: .6rem 1rem; border-radius: 8px; margin-bottom: 1.5rem;
      font-size: .9rem; display: none;
    }
    #status-bar.error   { background: #fff0f0; color: var(--danger);  display: block; }
    #status-bar.success { background: #f0fff4; color: var(--success); display: block; }

    /* ── Product grid ── */
    #product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    .product-card {
      background: var(--card); border-radius: 14px; box-shadow: var(--shadow);
      padding: 1.25rem; display: flex; flex-direction: column; gap: .75rem;
      transition: transform .15s, box-shadow .15s;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .product-category {
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
      color: var(--primary); letter-spacing: .5px;
    }
    .product-name { font-size: 1rem; font-weight: 700; }
    .product-desc { font-size: .85rem; color: var(--text-muted); flex: 1; line-height: 1.5; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .product-stock { font-size: .8rem; color: var(--text-muted); }
    .add-btn {
      background: var(--primary); color: #fff; border: none; border-radius: 8px;
      padding: .45rem .9rem; cursor: pointer; font-size: .85rem; font-weight: 600;
      transition: background .15s;
    }
    .add-btn:hover { background: var(--primary-dark); }
    .add-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #e8e8ec 25%, #f5f5f7 50%, #e8e8ec 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

    /* ── Cart overlay ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 200; display: none;
    }
    .overlay.open { display: block; }
    .cart-panel {
      position: fixed; top: 0; right: 0; height: 100%; width: min(420px, 100vw);
      background: var(--card); box-shadow: -4px 0 24px rgba(0,0,0,.15);
      display: flex; flex-direction: column; z-index: 201;
      transform: translateX(100%); transition: transform .25s ease;
    }
    .cart-panel.open { transform: translateX(0); }
    .cart-header {
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-header h3 { font-size: 1.1rem; font-weight: 700; }
    .close-btn {
      background: none; border: none; cursor: pointer; font-size: 1.4rem;
      color: var(--text-muted); line-height: 1;
    }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
    .cart-empty { text-align: center; color: var(--text-muted); padding: 3rem 0; font-size: .95rem; }
    .cart-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .75rem 0; border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .ci-name { flex: 1; font-size: .9rem; font-weight: 600; }
    .ci-qty { font-size: .85rem; color: var(--text-muted); white-space: nowrap; }
    .ci-price { font-size: .9rem; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .cart-footer {
      padding: 1.2rem 1.5rem; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: .75rem;
    }
    .cart-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 1rem; }
    .clear-btn {
      background: none; border: 1px solid var(--danger); color: var(--danger);
      border-radius: 8px; padding: .5rem; cursor: pointer; font-size: .9rem; font-weight: 600;
      transition: background .15s;
    }
    .clear-btn:hover { background: var(--danger); color: #fff; }
    .checkout-btn {
      background: var(--success); color: #fff; border: none; border-radius: 8px;
      padding: .7rem; cursor: pointer; font-size: .95rem; font-weight: 700;
      transition: opacity .15s;
    }
    .checkout-btn:hover { opacity: .88; }
  </style>
</head>
<body>

<header>
  <div class="logo">ShopNow</div>
  <button class="cart-btn" onclick="openCart()">
    🛒 Cart <span class="cart-badge" id="cart-count">0</span>
  </button>
</header>

<main>
  <h2>Featured Products</h2>
  <div id="status-bar"></div>
  <div id="product-grid"></div>
</main>

<!-- Cart -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<aside class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h3>Your Cart</h3>
    <button class="close-btn" onclick="closeCart()">×</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total">$0.00</span>
    </div>
    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
    <button class="checkout-btn">Checkout (Demo)</button>
  </div>
</aside>

<script>
  // ── Session ─────────────────────────────────────────────────────────────
  let sessionId = localStorage.getItem("shopnow_session");
  if (!sessionId) {
    sessionId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
    localStorage.setItem("shopnow_session", sessionId);
  }

  let cart = [];

  // ── Helpers ──────────────────────────────────────────────────────────────
  function showStatus(msg, type) {
    const el = document.getElementById("status-bar");
    el.textContent = msg;
    el.className = type;
    if (type === "success") setTimeout(() => el.style.display = "none", 3000);
  }

  function fmt(n) {
    return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(n);
  }

  // ── Cart ─────────────────────────────────────────────────────────────────
  function renderCart() {
    const container = document.getElementById("cart-items");
    const countEl   = document.getElementById("cart-count");
    const totalEl   = document.getElementById("cart-total");

    if (!cart.length) {
      container.innerHTML = '<p class="cart-empty">Your cart is empty.</p>';
      countEl.textContent = 0;
      totalEl.textContent = "$0.00";
      return;
    }

    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    countEl.textContent = cart.reduce((s, i) => s + i.quantity, 0);
    totalEl.textContent = fmt(total);

    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="ci-name">${item.name}</div>
        <div class="ci-qty">× ${item.quantity}</div>
        <div class="ci-price">${fmt(item.price * item.quantity)}</div>
      </div>
    `).join("");
  }

  function openCart()  { document.getElementById("cart-panel").classList.add("open"); document.getElementById("overlay").classList.add("open"); }
  function closeCart() { document.getElementById("cart-panel").classList.remove("open"); document.getElementById("overlay").classList.remove("open"); }

  async function addToCart(product) {
    try {
      const res = await fetch(`/api/cart/${sessionId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ product_id: product.id, name: product.name, price: product.price, quantity: 1 }),
      });
      const data = await res.json();
      cart = data.cart;
      renderCart();
      showStatus(`"${product.name}" added to cart!`, "success");
    } catch (err) {
      showStatus("Failed to add to cart. Is the backend running?", "error");
    }
  }

  async function clearCart() {
    try {
      await fetch(`/api/cart/${sessionId}`, { method: "DELETE" });
      cart = [];
      renderCart();
      showStatus("Cart cleared.", "success");
    } catch (err) {
      showStatus("Failed to clear cart.", "error");
    }
  }

  async function loadCart() {
    try {
      const res = await fetch(`/api/cart/${sessionId}`);
      const data = await res.json();
      cart = data.cart || [];
      renderCart();
    } catch { cart = []; renderCart(); }
  }

  // ── Products ─────────────────────────────────────────────────────────────
  function renderSkeletons(count = 8) {
    const grid = document.getElementById("product-grid");
    grid.innerHTML = Array.from({ length: count }, () => `
      <div class="product-card">
        <div class="skeleton" style="height:14px;width:60%"></div>
        <div class="skeleton" style="height:18px;width:80%"></div>
        <div class="skeleton" style="height:50px"></div>
        <div class="skeleton" style="height:28px"></div>
      </div>
    `).join("");
  }

  async function loadProducts() {
    renderSkeletons();
    try {
      const res  = await fetch("/api/products");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderProducts(data.products || []);
    } catch (err) {
      showStatus(`Failed to load products: ${err.message}. Make sure the backend service is running.`, "error");
      document.getElementById("product-grid").innerHTML = "";
    }
  }

  function renderProducts(products) {
    const grid = document.getElementById("product-grid");
    if (!products.length) {
      grid.innerHTML = '<p style="color:var(--text-muted)">No products available.</p>';
      return;
    }
    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <span class="product-category">${p.category || "General"}</span>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.description || ""}</div>
        <div class="product-footer">
          <span class="product-price">${fmt(p.price)}</span>
          <span class="product-stock">${p.stock > 0 ? `${p.stock} in stock` : "Out of stock"}</span>
        </div>
        <button class="add-btn" ${p.stock === 0 ? "disabled" : ""}
          onclick='addToCart(${JSON.stringify(p)})'>
          Add to Cart
        </button>
      </div>
    `).join("");
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  loadProducts();
  loadCart();
</script>
</body>
</html>
