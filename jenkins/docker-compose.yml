version: "3.9"

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopnow-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"   # Web UI
      - "50000:50000" # Agent connector
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount host Docker socket so Jenkins can build images
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Skip setup wizard; use configuration-as-code or manual first-run
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dhudson.model.DirectoryBrowserSupport.CSP=
      # AWS credentials for local use — prefer IAM roles on EC2 in production
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}

volumes:
  jenkins_home:
